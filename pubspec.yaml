name: invoice_discounting_app
description: Invoice Discounting Platform - Investor App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.2.0
  # Networking
  http: ^1.6.0
  # Storage
  shared_preferences: ^2.5.4
  # Firebase Push Notifications
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.4
  # Biometric
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  # Theme
  provider: ^6.1.5+1
  # PDF
  pdf: ^3.12.0
  printing: ^5.14.3
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.24.0
  image_picker: ^1.2.1
  dio: ^5.9.2
  #  vibration: ^3.1.8
  haptic_feedback: ^0.6.4+3
  home_widget: ^0.9.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  shimmer: ^3.0.0
  animations: ^2.1.1
  dynamic_color: ^1.8.1
  screen_protector: ^1.5.1
  jailbreak_root_detection: ^1.2.0+1
  file_picker: ^8.1.7
  razorpay_flutter: ^1.3.6
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
    - assets/